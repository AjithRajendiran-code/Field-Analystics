<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fielding Positions Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #102019;
    --panel: #182a21;
    --panel-2: #21362a;
    --field-outer: #25523b;
    --field-inner: #2f6b4d;
    --accent: #d8ab2f;
    --text: #eff5ed;
    --muted: #9caf9f;
    --border: rgba(216, 171, 47, 0.28);
    --token: #f4f7ef;
    --wk: #efba42;
    --danger: #dd6b6b;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: radial-gradient(circle at 20% 20%, #1a3427, var(--bg) 65%);
    color: var(--text);
    font-family: "IBM Plex Sans", sans-serif;
    min-height: 100vh;
    padding: 18px;
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    height: fit-content;
  }

  .title {
    font-family: "DM Serif Display", serif;
    color: var(--accent);
    font-size: 24px;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input,
  select,
  button {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    padding: 10px 12px;
  }

  input:focus,
  select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form {
    display: grid;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn {
    cursor: pointer;
    font-weight: 600;
    transition: background 0.16s, border-color 0.16s;
  }

  .btn:hover {
    border-color: var(--accent);
    background: rgba(216, 171, 47, 0.14);
  }

  .btn-danger {
    border-color: rgba(221, 107, 107, 0.45);
    color: #ffc9c9;
  }

  .btn-danger:hover {
    border-color: var(--danger);
    background: rgba(221, 107, 107, 0.15);
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .players {
    margin-top: 12px;
    display: grid;
    gap: 6px;
    max-height: 320px;
    overflow: auto;
  }

  .player-item {
    border: 1px solid var(--border);
    background: var(--panel-2);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .player-item .meta {
    color: var(--muted);
    font-size: 11px;
  }

  .remove-btn {
    background: transparent;
    border: none;
    width: auto;
    color: #f2a7a7;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
  }

  .field-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 700px;
  }

  .field-svg {
    width: min(90vw, 760px);
    height: min(90vw, 760px);
    max-width: 760px;
    max-height: 760px;
  }

  .field-token {
    cursor: move;
  }

  .legend {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 980px) {
    .app {
      grid-template-columns: 1fr;
    }

    .field-wrap {
      min-height: auto;
    }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="title">Fielding Board</div>
    <div class="subtitle">Only player name and position. Wicket keeper is fixed.</div>

    <div class="form">
      <div>
        <label for="wkName">Wicket Keeper Name</label>
        <input id="wkName" type="text" placeholder="Enter wicket keeper name">
      </div>
      <div class="row-2">
        <div>
          <label for="strikerHand">Striker Hand</label>
          <select id="strikerHand">
            <option value="RHB">Right Hand</option>
            <option value="LHB">Left Hand</option>
          </select>
        </div>
        <div>
          <label for="nonStrikerHand">Non-Striker Hand</label>
          <select id="nonStrikerHand">
            <option value="RHB">Right Hand</option>
            <option value="LHB">Left Hand</option>
          </select>
        </div>
      </div>
      <div>
        <label for="playerName">Player Name</label>
        <input id="playerName" type="text" placeholder="Enter player name">
      </div>
      <div>
        <label for="playerPosition">Fielding Position</label>
        <select id="playerPosition"></select>
      </div>
      <button class="btn" id="addPlayerBtn">Add Player</button>
      <button class="btn" id="exportPngBtn">Export PNG</button>
      <button class="btn btn-danger" id="clearPlayersBtn">Clear All Players</button>
    </div>

    <div class="players" id="playersList"></div>
  </aside>

  <section>
    <div class="field-wrap">
      <svg class="field-svg" id="fieldSvg" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg" aria-label="Cricket field">
        <defs>
          <radialGradient id="fieldGradient" cx="50%" cy="45%" r="60%">
            <stop offset="0%" stop-color="#3b7f5c"/>
            <stop offset="100%" stop-color="#1d402f"/>
          </radialGradient>
        </defs>

        <circle cx="350" cy="350" r="320" fill="url(#fieldGradient)" stroke="#84a78f" stroke-opacity="0.5" stroke-width="2"/>
        <circle cx="350" cy="350" r="185" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-dasharray="8 7"/>

        <rect x="331" y="248" width="38" height="204" rx="2" fill="#c5a26a" stroke="#8b6a37"/>
        <line x1="324" y1="285" x2="376" y2="285" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.8"/>
        <line x1="324" y1="415" x2="376" y2="415" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.8"/>

        <g id="batsmenInfo">
          <circle cx="350" cy="422" r="7" fill="#d8ab2f" stroke="#ffffff" stroke-width="1.2"/>
          <text x="350" y="440" text-anchor="middle" font-size="9" fill="#f7e8bf" id="strikerHandLabel">Striker: RHB</text>
          <circle cx="350" cy="278" r="7" fill="#dd6b6b" stroke="#ffffff" stroke-width="1.2"/>
          <text x="350" y="260" text-anchor="middle" font-size="9" fill="#ffd3d3" id="nonStrikerHandLabel">Non-Striker: RHB</text>
        </g>

        <g id="constantWK">
          <circle cx="350" cy="465" r="18" fill="var(--wk)" stroke="#ffffff" stroke-width="1.5"/>
          <text x="350" y="468" text-anchor="middle" font-size="10" font-weight="700" fill="#1a241d">WK</text>
          <text x="350" y="492" text-anchor="middle" font-size="11" fill="#f8d98f" id="wkNameLabel">Wicket Keeper</text>
          <text x="350" y="508" text-anchor="middle" font-size="10" fill="#f8d98f" fill-opacity="0.8">(Fixed)</text>
        </g>

        <g id="positionLabels"></g>
        <g id="fieldTokens"></g>
      </svg>
    </div>
    <div class="legend">
      <span>White: Players</span>
      <span>Gold: Fixed Wicket Keeper</span>
      <span>Drag players to adjust</span>
    </div>
  </section>
</div>

<script>
  const POSITIONS = {
    "Slip": { x: 420, y: 455 },
    "Second Slip": { x: 450, y: 430 },
    "Gully": { x: 500, y: 390 },
    "Point": { x: 525, y: 350 },
    "Backward Point": { x: 540, y: 385 },
    "Cover": { x: 500, y: 285 },
    "Cover Point": { x: 475, y: 305 },
    "Extra Cover": { x: 455, y: 260 },
    "Mid Off": { x: 395, y: 220 },
    "Long Off": { x: 440, y: 105 },
    "Deep Cover": { x: 545, y: 200 },
    "Third Man": { x: 460, y: 560 },
    "Fine Third": { x: 420, y: 590 },
    "Mid On": { x: 305, y: 220 },
    "Long On": { x: 260, y: 105 },
    "Mid Wicket": { x: 245, y: 280 },
    "Square Leg": { x: 190, y: 350 },
    "Backward Square Leg": { x: 175, y: 395 },
    "Fine Leg": { x: 275, y: 555 },
    "Deep Square Leg": { x: 120, y: 350 },
    "Deep Mid Wicket": { x: 130, y: 230 },
    "Leg Slip": { x: 300, y: 455 },
    "Short Leg": { x: 305, y: 390 },
    "Silly Point": { x: 395, y: 355 },
    "Silly Mid On": { x: 320, y: 315 },
    "Silly Mid Off": { x: 380, y: 315 },
    "Short Cover": { x: 430, y: 300 },
    "Short Fine Leg": { x: 300, y: 470 }
  };

  let players = [];
  const STORAGE_KEY = "fielding_board_state_v1";

  const wkNameInput = document.getElementById("wkName");
  const strikerHandSelect = document.getElementById("strikerHand");
  const nonStrikerHandSelect = document.getElementById("nonStrikerHand");
  const playerNameInput = document.getElementById("playerName");
  const playerPositionSelect = document.getElementById("playerPosition");
  const addPlayerBtn = document.getElementById("addPlayerBtn");
  const exportPngBtn = document.getElementById("exportPngBtn");
  const clearPlayersBtn = document.getElementById("clearPlayersBtn");
  const playersList = document.getElementById("playersList");
  const fieldTokens = document.getElementById("fieldTokens");
  const positionLabels = document.getElementById("positionLabels");
  const fieldSvg = document.getElementById("fieldSvg");
  const wkNameLabel = document.getElementById("wkNameLabel");
  const strikerHandLabel = document.getElementById("strikerHandLabel");
  const nonStrikerHandLabel = document.getElementById("nonStrikerHandLabel");

  function updateWicketKeeperName() {
    const name = wkNameInput.value.trim();
    wkNameLabel.textContent = name || "Wicket Keeper";
    saveState();
  }

  function updateBatsmenHands() {
    strikerHandLabel.textContent = "Striker: " + strikerHandSelect.value;
    nonStrikerHandLabel.textContent = "Non-Striker: " + nonStrikerHandSelect.value;
    saveState();
  }

  function initPositionOptions() {
    Object.keys(POSITIONS).forEach((position) => {
      const option = document.createElement("option");
      option.value = position;
      option.textContent = position;
      playerPositionSelect.appendChild(option);
    });
  }

  function renderPositionGuides() {
    positionLabels.innerHTML = "";
    Object.entries(POSITIONS).forEach(([name, point]) => {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.innerHTML = `
        <circle cx="${point.x}" cy="${point.y}" r="3" fill="#d8ab2f" fill-opacity="0.55" />
        <text x="${point.x}" y="${point.y - 8}" text-anchor="middle" font-size="8" fill="#dce8df" fill-opacity="0.75">${name}</text>
      `;
      positionLabels.appendChild(g);
    });
  }

  function addPlayer() {
    const name = playerNameInput.value.trim();
    const position = playerPositionSelect.value;
    if (!name || !position) {
      return;
    }

    const { x, y } = POSITIONS[position];
    players.push({
      id: Date.now() + Math.random(),
      name,
      position,
      x,
      y
    });

    playerNameInput.value = "";
    renderPlayers();
    saveState();
  }

  function removePlayer(id) {
    players = players.filter((player) => player.id !== id);
    renderPlayers();
    saveState();
  }

  function clearPlayers() {
    players = [];
    renderPlayers();
    saveState();
  }

  function renderPlayersList() {
    playersList.innerHTML = "";

    if (players.length === 0) {
      playersList.innerHTML = "<div class='player-item'><span>No players added yet.</span></div>";
      return;
    }

    players.forEach((player) => {
      const row = document.createElement("div");
      row.className = "player-item";
      row.innerHTML = `
        <div>
          <div>${player.name}</div>
          <div class="meta">${player.position}</div>
        </div>
        <button class="remove-btn" aria-label="Remove ${player.name}">x</button>
      `;
      row.querySelector(".remove-btn").addEventListener("click", () => removePlayer(player.id));
      playersList.appendChild(row);
    });
  }

  function getInitials(name) {
    return name
      .split(" ")
      .filter(Boolean)
      .slice(0, 2)
      .map((part) => part[0])
      .join("")
      .toUpperCase();
  }

  function createDraggableToken(player) {
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute("class", "field-token");

    const initials = getInitials(player.name) || "P";
    const firstName = player.name.split(" ")[0];

    group.innerHTML = `
      <circle cx="${player.x}" cy="${player.y}" r="18" fill="var(--token)" stroke="#1a3024" stroke-width="1.5" />
      <text x="${player.x}" y="${player.y + 1}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#1a3024">${initials}</text>
      <text x="${player.x}" y="${player.y + 28}" text-anchor="middle" font-size="10" fill="#ffffff" fill-opacity="0.92">${firstName}</text>
    `;

    let dragging = false;

    group.addEventListener("mousedown", (event) => {
      event.preventDefault();
      dragging = true;

      const svgRect = fieldSvg.getBoundingClientRect();
      const scaleX = 700 / svgRect.width;
      const scaleY = 700 / svgRect.height;

      function onMove(moveEvent) {
        if (!dragging) {
          return;
        }

        const nextX = Math.round((moveEvent.clientX - svgRect.left) * scaleX);
        const nextY = Math.round((moveEvent.clientY - svgRect.top) * scaleY);
        const centerX = 350;
        const centerY = 350;
        const distance = Math.hypot(nextX - centerX, nextY - centerY);

        if (distance <= 315) {
          player.x = nextX;
          player.y = nextY;
        }

        renderFieldTokens();
      }

      function onUp() {
        dragging = false;
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        saveState();
      }

      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });

    return group;
  }

  function renderFieldTokens() {
    fieldTokens.innerHTML = "";
    players.forEach((player) => {
      fieldTokens.appendChild(createDraggableToken(player));
    });
  }

  function renderPlayers() {
    renderPlayersList();
    renderFieldTokens();
  }

  function exportPNG() {
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(fieldSvg);
    svgString = svgString.replace(/xmlns="[^"]*"/, 'xmlns="http://www.w3.org/2000/svg"');

    const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const image = new Image();

    image.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 1200;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#102019";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

      const link = document.createElement("a");
      link.download = "fielding-board.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      URL.revokeObjectURL(url);
    };

    image.src = url;
  }

  function saveState() {
    const state = {
      wicketKeeperName: wkNameInput.value,
      strikerHand: strikerHandSelect.value,
      nonStrikerHand: nonStrikerHandSelect.value,
      players
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      return;
    }

    try {
      const state = JSON.parse(raw);
      wkNameInput.value = state.wicketKeeperName || "";
      strikerHandSelect.value = state.strikerHand || "RHB";
      nonStrikerHandSelect.value = state.nonStrikerHand || "RHB";
      players = Array.isArray(state.players) ? state.players : [];
    } catch (_error) {
      players = [];
    }
  }

  addPlayerBtn.addEventListener("click", addPlayer);
  exportPngBtn.addEventListener("click", exportPNG);
  clearPlayersBtn.addEventListener("click", clearPlayers);
  wkNameInput.addEventListener("input", updateWicketKeeperName);
  strikerHandSelect.addEventListener("change", updateBatsmenHands);
  nonStrikerHandSelect.addEventListener("change", updateBatsmenHands);
  playerNameInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      addPlayer();
    }
  });

  initPositionOptions();
  loadState();
  renderPositionGuides();
  updateWicketKeeperName();
  updateBatsmenHands();
  renderPlayers();
</script>
</body>
</html>
